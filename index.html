<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust Book Quiz — Ferris Challenge</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rust-orange: #f74c00;
        --rust-dark: #1a1a2e;
        --rust-darker: #0f0f1a;
        --rust-accent: #ff8c42;
        --rust-gold: #ffd700;
        --crate-brown: #8b5e3c;
        --terminal-green: #00ff88;
        --correct: #00e676;
        --wrong: #ff1744;
        --bg-card: rgba(26, 26, 46, 0.85);
        --text-primary: #e8e6e3;
        --text-dim: #8a8a9a;
        --glow-orange: 0 0 30px rgba(247, 76, 0, 0.3);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "IBM Plex Mono", monospace;
        background: var(--rust-darker);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(247, 76, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(247, 76, 0, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .bg-glow {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(247, 76, 0, 0.08),
          transparent 70%
        );
        top: -200px;
        right: -200px;
        animation: float 12s ease-in-out infinite alternate;
      }

      .bg-glow-2 {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 255, 136, 0.04),
          transparent 70%
        );
        bottom: -200px;
        left: -100px;
        animation: float 15s ease-in-out infinite alternate-reverse;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(40px, 30px) scale(1.1);
        }
      }

      #app {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 30px 20px;
        min-height: 100vh;
      }

      /* ── HEADER ── */
      .header {
        text-align: center;
        padding: 40px 0 30px;
      }

      .header .logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        font-weight: 600;
        color: var(--rust-orange);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .header h1 {
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-accent),
          var(--rust-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }

      .header .subtitle {
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
        letter-spacing: 1px;
      }

      .ferris {
        font-size: 48px;
        margin: 15px 0;
        animation: wiggle 2s ease-in-out infinite;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
      }

      /* ── STATS BAR ── */
      .stats-bar {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      .stat {
        background: var(--bg-card);
        border: 1px solid rgba(247, 76, 0, 0.15);
        border-radius: 10px;
        padding: 10px 18px;
        text-align: center;
        min-width: 100px;
        backdrop-filter: blur(10px);
      }

      .stat-value {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        color: var(--rust-orange);
      }

      .stat-label {
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-top: 2px;
      }

      /* ── LEVEL SELECT ── */
      .screen {
        display: none;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .levels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .level-card {
        background: var(--bg-card);
        border: 1px solid rgba(247, 76, 0, 0.1);
        border-radius: 12px;
        padding: 16px 18px;
        cursor: pointer;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .level-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(247, 76, 0, 0.05),
          transparent
        );
        opacity: 0;
        transition: opacity 0.25s;
      }

      .level-card:hover {
        border-color: var(--rust-orange);
        transform: translateY(-2px);
        box-shadow: var(--glow-orange);
      }

      .level-card:hover::before {
        opacity: 1;
      }

      .level-card.locked {
        opacity: 0.4;
        cursor: not-allowed;
        filter: grayscale(0.5);
      }

      .level-card.locked:hover {
        transform: none;
        border-color: rgba(247, 76, 0, 0.1);
        box-shadow: none;
      }

      .level-card.completed {
        border-color: rgba(0, 230, 118, 0.3);
      }

      .level-card.completed .level-badge {
        background: var(--correct);
        color: var(--rust-darker);
      }

      .level-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--rust-orange);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 5px;
        position: relative;
        z-index: 1;
      }

      .level-title {
        font-size: 14px;
        font-weight: 600;
        position: relative;
        z-index: 1;
        line-height: 1.4;
      }

      .level-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(247, 76, 0, 0.2);
        color: var(--rust-orange);
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 6px;
        font-family: "JetBrains Mono", monospace;
      }

      .level-card.locked .level-badge {
        background: rgba(138, 138, 154, 0.2);
        color: var(--text-dim);
      }

      /* ── QUIZ SCREEN ── */
      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quiz-chapter {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--rust-orange);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .quiz-progress-text {
        font-size: 13px;
        color: var(--text-dim);
      }

      .progress-bar-container {
        width: 100%;
        height: 6px;
        background: rgba(247, 76, 0, 0.1);
        border-radius: 3px;
        margin-bottom: 28px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--rust-orange),
          var(--rust-accent)
        );
        border-radius: 3px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .question-card {
        background: var(--bg-card);
        border: 1px solid rgba(247, 76, 0, 0.12);
        border-radius: 16px;
        padding: 30px;
        backdrop-filter: blur(10px);
        margin-bottom: 20px;
      }

      .question-number {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .question-text {
        font-size: 17px;
        font-weight: 500;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .question-text code {
        font-family: "JetBrains Mono", monospace;
        background: rgba(247, 76, 0, 0.1);
        color: var(--rust-accent);
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 14px;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        background: rgba(247, 76, 0, 0.04);
        border: 1px solid rgba(247, 76, 0, 0.12);
        border-radius: 10px;
        padding: 14px 18px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: "IBM Plex Mono", monospace;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
        line-height: 1.5;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .option-btn:hover:not(.disabled) {
        border-color: var(--rust-orange);
        background: rgba(247, 76, 0, 0.08);
        transform: translateX(4px);
      }

      .option-btn .opt-key {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-weight: 700;
        font-size: 12px;
        background: rgba(247, 76, 0, 0.1);
        color: var(--rust-orange);
        transition: all 0.2s;
      }

      .option-btn.correct {
        border-color: var(--correct);
        background: rgba(0, 230, 118, 0.08);
        animation: correctPulse 0.5s ease;
      }

      .option-btn.correct .opt-key {
        background: var(--correct);
        color: var(--rust-darker);
      }

      .option-btn.wrong {
        border-color: var(--wrong);
        background: rgba(255, 23, 68, 0.08);
        animation: shake 0.4s ease;
      }

      .option-btn.wrong .opt-key {
        background: var(--wrong);
        color: #fff;
      }

      .option-btn.disabled {
        pointer-events: none;
        opacity: 0.5;
      }
      .option-btn.correct.disabled,
      .option-btn.wrong.disabled {
        opacity: 1;
      }

      @keyframes correctPulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.015);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }

      .explanation-box {
        margin-top: 16px;
        padding: 14px 18px;
        background: rgba(0, 255, 136, 0.04);
        border-left: 3px solid var(--terminal-green);
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-dim);
        animation: fadeIn 0.3s ease;
      }

      .explanation-box code {
        font-family: "JetBrains Mono", monospace;
        background: rgba(247, 76, 0, 0.1);
        color: var(--rust-accent);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 12px;
      }

      .next-btn,
      .back-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        padding: 12px 28px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s ease;
        text-transform: uppercase;
        border: none;
      }

      .next-btn {
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-accent)
        );
        color: #fff;
        margin-top: 20px;
      }

      .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(247, 76, 0, 0.3);
      }

      .back-btn {
        background: transparent;
        border: 1px solid rgba(247, 76, 0, 0.25) !important;
        color: var(--text-dim);
      }

      .back-btn:hover {
        color: var(--rust-orange);
        border-color: var(--rust-orange) !important;
      }

      .btn-row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      /* ── RESULTS SCREEN ── */
      .results-card {
        background: var(--bg-card);
        border: 1px solid rgba(247, 76, 0, 0.12);
        border-radius: 16px;
        padding: 40px;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      .results-score {
        font-family: "JetBrains Mono", monospace;
        font-size: 64px;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .results-label {
        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 8px 0 20px;
      }

      .results-msg {
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .star {
        display: inline-block;
        font-size: 28px;
        margin: 0 3px;
      }
      .star.filled {
        animation: starPop 0.4s ease backwards;
      }
      .star.filled:nth-child(2) {
        animation-delay: 0.15s;
      }
      .star.filled:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes starPop {
        0% {
          transform: scale(0) rotate(-30deg);
          opacity: 0;
        }
        60% {
          transform: scale(1.3) rotate(5deg);
        }
        100% {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(247, 76, 0, 0.2);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(247, 76, 0, 0.4);
      }

      @media (max-width: 500px) {
        .question-card {
          padding: 20px;
        }
        .levels-grid {
          grid-template-columns: 1fr;
        }
        .stats-bar {
          gap: 8px;
        }
        .stat {
          min-width: 80px;
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div id="app">
      <div class="header">
        <div class="logo">// The Ferris Challenge</div>
        <h1>Rust Book Quiz</h1>
        <div class="subtitle">
          Master "The Rust Programming Language" — chapter by chapter
        </div>
        <div class="ferris">🦀</div>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <div class="stat-value" id="totalScore">0</div>
          <div class="stat-label">Score</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalCompleted">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="totalStars">0</div>
          <div class="stat-label">★ Stars</div>
        </div>
      </div>

      <!-- Level Select -->
      <div class="screen active" id="levelSelect">
        <div class="levels-grid" id="levelsGrid"></div>
      </div>

      <!-- Quiz Screen -->
      <div class="screen" id="quizScreen">
        <div class="quiz-header">
          <div class="quiz-chapter" id="quizChapter"></div>
          <div class="quiz-progress-text" id="quizProgressText"></div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div id="questionArea"></div>
        <div class="btn-row">
          <button class="back-btn" onclick="showScreen('levelSelect')">
            ← Levels
          </button>
          <button
            class="next-btn"
            id="nextBtn"
            style="display: none"
            onclick="nextQuestion()"
          >
            Next →
          </button>
        </div>
      </div>

      <!-- Results Screen -->
      <div class="screen" id="resultsScreen">
        <div class="results-card">
          <div id="resultsStars"></div>
          <div class="results-score" id="resultsScore"></div>
          <div class="results-label">Correct Answers</div>
          <div class="results-msg" id="resultsMsg"></div>
          <div class="btn-row" style="justify-content: center">
            <button class="back-btn" onclick="showScreen('levelSelect')">
              ← Levels
            </button>
            <button class="next-btn" onclick="retryLevel()">Retry 🔄</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ─── QUIZ DATA: one level per Rust Book chapter ───
      const levels = [
        {
          chapter: 1,
          title: "Getting Started",
          questions: [
            {
              q: "What is the command to create a new Rust project with Cargo?",
              opts: [
                "<code>cargo new</code>",
                "<code>cargo create</code>",
                "<code>rustc init</code>",
                "<code>rust new</code>",
              ],
              ans: 0,
              explain:
                "<code>cargo new project_name</code> creates a new project directory with a <code>Cargo.toml</code> and <code>src/main.rs</code>.",
            },
            {
              q: "Which file is the manifest for a Cargo project?",
              opts: [
                "<code>Cargo.toml</code>",
                "<code>Cargo.lock</code>",
                "<code>rustfmt.toml</code>",
                "<code>config.rs</code>",
              ],
              ans: 0,
              explain:
                "<code>Cargo.toml</code> contains metadata, dependencies, and build configuration for the project.",
            },
            {
              q: "What does the <code>rustup</code> tool manage?",
              opts: [
                "Rust toolchain installations",
                "Package publishing",
                "Code formatting",
                "Memory allocation",
              ],
              ans: 0,
              explain:
                "<code>rustup</code> installs and manages Rust compiler versions, targets, and associated tools.",
            },
            {
              q: "What is the entry point function in a Rust program?",
              opts: [
                "<code>fn main()</code>",
                "<code>fn start()</code>",
                "<code>fn init()</code>",
                "<code>fn run()</code>",
              ],
              ans: 0,
              explain:
                "Every Rust binary starts execution at <code>fn main()</code>.",
            },
            {
              q: "Which command compiles and runs a Cargo project?",
              opts: [
                "<code>cargo run</code>",
                "<code>cargo build --execute</code>",
                "<code>cargo compile</code>",
                "<code>rustc run</code>",
              ],
              ans: 0,
              explain:
                "<code>cargo run</code> compiles the project (if needed) and then executes the resulting binary.",
            },
          ],
        },
        {
          chapter: 2,
          title: "Programming a Guessing Game",
          questions: [
            {
              q: "Which crate is commonly used for random number generation in the Guessing Game chapter?",
              opts: [
                "<code>rand</code>",
                "<code>random</code>",
                "<code>num_rand</code>",
                "<code>gen</code>",
              ],
              ans: 0,
              explain:
                "The <code>rand</code> crate provides random number generation via traits like <code>Rng</code>.",
            },
            {
              q: "How do you read user input from stdin in Rust?",
              opts: [
                "<code>io::stdin().read_line(&mut s)</code>",
                "<code>io::read()</code>",
                "<code>stdin.get_line(s)</code>",
                "<code>console::input()</code>",
              ],
              ans: 0,
              explain:
                "<code>std::io::stdin().read_line(&mut string)</code> reads a line of input into a mutable <code>String</code>.",
            },
            {
              q: "What does the <code>match</code> expression do when comparing the guess to the secret?",
              opts: [
                "Branches based on the <code>Ordering</code> variant",
                "Loops until equal",
                "Throws an exception",
                "Returns a boolean",
              ],
              ans: 0,
              explain:
                "A <code>match</code> on <code>cmp</code> returns <code>Less</code>, <code>Greater</code>, or <code>Equal</code> variants of <code>std::cmp::Ordering</code>.",
            },
            {
              q: "What keyword creates an infinite loop in the guessing game?",
              opts: [
                "<code>loop</code>",
                "<code>while true</code>",
                "<code>for ever</code>",
                "<code>repeat</code>",
              ],
              ans: 0,
              explain:
                "<code>loop { }</code> creates an unconditional infinite loop; use <code>break</code> to exit.",
            },
            {
              q: "How do you convert a <code>String</code> to a number type like <code>u32</code>?",
              opts: [
                "<code>string.trim().parse()</code>",
                "<code>string.to_int()</code>",
                "<code>u32::from_string(s)</code>",
                "<code>cast(string)</code>",
              ],
              ans: 0,
              explain:
                "Calling <code>.trim().parse()</code> on a <code>String</code> removes whitespace and parses it into the inferred numeric type.",
            },
          ],
        },
        {
          chapter: 3,
          title: "Common Programming Concepts",
          questions: [
            {
              q: "In Rust, variables are immutable by default. Which keyword makes a variable mutable?",
              opts: [
                "<code>mut</code>",
                "<code>var</code>",
                "<code>mutable</code>",
                "<code>let!</code>",
              ],
              ans: 0,
              explain:
                "Use <code>let mut x = 5;</code> to declare a mutable binding.",
            },
            {
              q: "What is shadowing in Rust?",
              opts: [
                "Re-declaring a variable with the same name using <code>let</code>",
                "Making a variable mutable",
                "Creating a global variable",
                "Cloning a variable",
              ],
              ans: 0,
              explain:
                "Shadowing lets you reuse a name and even change the type, unlike mutation with <code>mut</code>.",

      // ─── SHUFFLE UTILITY ───
      function shuffleOptions(questions) {
        return questions.map((q) => {
          const correctOpt = q.opts[q.ans];
          // Create index array and shuffle it (Fisher-Yates)
          const indices = q.opts.map((_, i) => i);
          for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
          }
          const newOpts = indices.map((i) => q.opts[i]);
          const newAns = newOpts.indexOf(correctOpt);
          return { ...q, opts: newOpts, ans: newAns };
        });
      }

      // ─── GAME STATE ───
      let state = {
        currentLevel: 0,
        currentQuestion: 0,
        score: 0,
        answered: false,
        levelScores: new Array(levels.length).fill(-1), // -1 = not attempted
        totalScore: 0,
        totalStars: 0,
        shuffledQuestions: [], // holds shuffled version for current level
      };

      // ─── INIT ───
      function init() {
        renderLevels();
        updateStats();
      }

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      // ─── LEVEL SELECT ───
      function renderLevels() {
        const grid = document.getElementById("levelsGrid");
        grid.innerHTML = "";
        levels.forEach((lvl, i) => {
          const unlocked = i === 0 || state.levelScores[i - 1] >= 0;
          const completed = state.levelScores[i] >= 0;
          const stars = completed
            ? getStars(state.levelScores[i], lvl.questions.length)
            : 0;
          const card = document.createElement("div");
          card.className = `level-card${unlocked ? "" : " locked"}${completed ? " completed" : ""}`;
          card.innerHTML = `
      <div class="level-num">Chapter ${lvl.chapter}</div>
      <div class="level-title">${lvl.title}</div>
      <div class="level-badge">${completed ? "★".repeat(stars) + "☆".repeat(3 - stars) : unlocked ? "5 Q" : "🔒"}</div>
    `;
          if (unlocked) card.onclick = () => startLevel(i);
          grid.appendChild(card);
        });
      }

      function getStars(correct, total) {
        const pct = correct / total;
        if (pct >= 0.9) return 3;
        if (pct >= 0.6) return 2;
        if (pct > 0) return 1;
        return 0;
      }

      // ─── START LEVEL ───
      function startLevel(idx) {
        state.currentLevel = idx;
        state.currentQuestion = 0;
        state.score = 0;
        state.answered = false;
        state.shuffledQuestions = shuffleOptions(levels[idx].questions);
        showScreen("quizScreen");
        renderQuestion();
      }

      function retryLevel() {
        startLevel(state.currentLevel);
      }

      // ─── RENDER QUESTION ───
      function renderQuestion() {
        const lvl = levels[state.currentLevel];
        const q = state.shuffledQuestions[state.currentQuestion];
        const total = lvl.questions.length;
        const num = state.currentQuestion + 1;

        document.getElementById("quizChapter").textContent =
          `Ch.${lvl.chapter} — ${lvl.title}`;
        document.getElementById("quizProgressText").textContent =
          `${num} / ${total}`;
        document.getElementById("progressBar").style.width =
          `${(num / total) * 100}%`;
        document.getElementById("nextBtn").style.display = "none";
        state.answered = false;

        const keys = ["A", "B", "C", "D"];
        document.getElementById("questionArea").innerHTML = `
    <div class="question-card">
      <div class="question-number">Question ${num} of ${total}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts
          .map(
            (opt, i) => `
          <button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
            <span class="opt-key">${keys[i]}</span>
            <span>${opt}</span>
          </button>
        `,
          )
          .join("")}
      </div>
      <div id="explanationSlot"></div>
    </div>
  `;
      }

      // ─── SELECT ANSWER ───
      function selectAnswer(idx) {
        if (state.answered) return;
        state.answered = true;

        const lvl = levels[state.currentLevel];
        const q = state.shuffledQuestions[state.currentQuestion];
        const btns = document.querySelectorAll(".option-btn");

        btns.forEach((btn, i) => {
          btn.classList.add("disabled");
          if (i === q.ans) btn.classList.add("correct");
          if (i === idx && idx !== q.ans) btn.classList.add("wrong");
        });

        if (idx === q.ans) state.score++;

        document.getElementById("explanationSlot").innerHTML = `
    <div class="explanation-box">
      ${idx === q.ans ? "✅" : "❌"} ${q.explain}
    </div>
  `;

        const isLast = state.currentQuestion >= lvl.questions.length - 1;
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.textContent = isLast ? "See Results →" : "Next →";
        nextBtn.style.display = "inline-block";
      }

      // ─── NEXT QUESTION ───
      function nextQuestion() {
        const lvl = levels[state.currentLevel];
        if (state.currentQuestion < lvl.questions.length - 1) {
          state.currentQuestion++;
          renderQuestion();
        } else {
          finishLevel();
        }
      }

      // ─── FINISH LEVEL ───
      function finishLevel() {
        const lvl = levels[state.currentLevel];
        const total = lvl.questions.length;
        const prev = state.levelScores[state.currentLevel];
        if (state.score > prev) {
          state.levelScores[state.currentLevel] = state.score;
        }

        // Recalculate totals
        state.totalScore = state.levelScores.reduce(
          (s, v) => s + (v > 0 ? v : 0),
          0,
        );
        state.totalStars = state.levelScores.reduce(
          (s, v, i) =>
            s + (v >= 0 ? getStars(v, levels[i].questions.length) : 0),
          0,
        );

        const stars = getStars(state.score, total);
        const messages = [
          "Keep studying! Re-read the chapter and try again. 🦀",
          "Good start! You're getting the fundamentals down.",
          "Solid knowledge! A few more details to master.",
          "Outstanding! You truly own this chapter! 🏆",
        ];

        document.getElementById("resultsStars").innerHTML = [1, 2, 3]
          .map(
            (i) =>
              `<span class="star ${i <= stars ? "filled" : ""}">${i <= stars ? "★" : "☆"}</span>`,
          )
          .join("");
        document.getElementById("resultsScore").textContent =
          `${state.score}/${total}`;
        document.getElementById("resultsMsg").textContent = messages[stars];

        updateStats();
        renderLevels();
        showScreen("resultsScreen");
      }

      function updateStats() {
        document.getElementById("totalScore").textContent = state.totalScore;
        document.getElementById("totalCompleted").textContent =
          state.levelScores.filter((v) => v >= 0).length + "/" + levels.length;
        document.getElementById("totalStars").textContent = state.totalStars;
      }

      // ── Keyboard support ──
      document.addEventListener("keydown", (e) => {
        const quizActive = document
          .getElementById("quizScreen")
          .classList.contains("active");
        if (!quizActive) return;
        const keyMap = { a: 0, b: 1, c: 2, d: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
        if (e.key.toLowerCase() in keyMap && !state.answered) {
          selectAnswer(keyMap[e.key.toLowerCase()]);
        }
        if ((e.key === "Enter" || e.key === " ") && state.answered) {
          e.preventDefault();
          nextQuestion();
        }
      });

      init();
    </script>
