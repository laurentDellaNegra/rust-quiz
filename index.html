<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust Book Quiz — Ferris Challenge</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rust-orange: #f74c00;
        --rust-dark: #1a1a2e;
        --rust-darker: #0f0f1a;
        --rust-accent: #ff8c42;
        --rust-gold: #ffd700;
        --crate-brown: #8b5e3c;
        --terminal-green: #00ff88;
        --correct: #00e676;
        --wrong: #ff1744;
        --bg-card: rgba(26, 26, 46, 0.85);
        --text-primary: #e8e6e3;
        --text-dim: #8a8a9a;
        --glow-orange: 0 0 30px rgba(247, 76, 0, 0.3);
        --grid-color: rgba(247, 76, 0, 0.03);
        --glow-1: rgba(247, 76, 0, 0.08);
        --glow-2: rgba(0, 255, 136, 0.04);
        --border-subtle: rgba(247, 76, 0, 0.1);
        --border-card: rgba(247, 76, 0, 0.12);
        --border-stat: rgba(247, 76, 0, 0.15);
        --opt-bg: rgba(247, 76, 0, 0.04);
        --opt-hover-bg: rgba(247, 76, 0, 0.08);
        --opt-key-bg: rgba(247, 76, 0, 0.1);
        --correct-bg: rgba(0, 230, 118, 0.08);
        --wrong-bg: rgba(255, 23, 68, 0.08);
        --explain-bg: rgba(0, 255, 136, 0.04);
        --code-bg: rgba(247, 76, 0, 0.1);
        --progress-bg: rgba(247, 76, 0, 0.1);
        --badge-bg: rgba(247, 76, 0, 0.2);
        --badge-locked-bg: rgba(138, 138, 154, 0.2);
        --completed-border: rgba(0, 230, 118, 0.3);
        --back-btn-border: rgba(247, 76, 0, 0.25);
        --scrollbar-thumb: rgba(247, 76, 0, 0.2);
        --scrollbar-hover: rgba(247, 76, 0, 0.4);
        --card-gradient: rgba(247, 76, 0, 0.05);
      }

      [data-theme="light"] {
        --rust-darker: #f5f0eb;
        --rust-dark: #ede5dc;
        --rust-orange: #d44000;
        --rust-accent: #e86a1e;
        --rust-gold: #c49000;
        --crate-brown: #7a5230;
        --terminal-green: #0a8f50;
        --correct: #0a8f50;
        --wrong: #d32f2f;
        --bg-card: rgba(255, 255, 255, 0.85);
        --text-primary: #2c2416;
        --text-dim: #7a7068;
        --glow-orange: 0 4px 20px rgba(212, 64, 0, 0.1);
        --grid-color: rgba(212, 64, 0, 0.04);
        --glow-1: rgba(212, 64, 0, 0.06);
        --glow-2: rgba(10, 143, 80, 0.04);
        --border-subtle: rgba(212, 64, 0, 0.1);
        --border-card: rgba(212, 64, 0, 0.12);
        --border-stat: rgba(212, 64, 0, 0.15);
        --opt-bg: rgba(212, 64, 0, 0.03);
        --opt-hover-bg: rgba(212, 64, 0, 0.07);
        --opt-key-bg: rgba(212, 64, 0, 0.1);
        --correct-bg: rgba(10, 143, 80, 0.08);
        --wrong-bg: rgba(211, 47, 47, 0.08);
        --explain-bg: rgba(10, 143, 80, 0.05);
        --code-bg: rgba(212, 64, 0, 0.07);
        --progress-bg: rgba(212, 64, 0, 0.1);
        --badge-bg: rgba(212, 64, 0, 0.12);
        --badge-locked-bg: rgba(122, 112, 104, 0.15);
        --completed-border: rgba(10, 143, 80, 0.35);
        --back-btn-border: rgba(212, 64, 0, 0.25);
        --scrollbar-thumb: rgba(212, 64, 0, 0.15);
        --scrollbar-hover: rgba(212, 64, 0, 0.3);
        --card-gradient: rgba(212, 64, 0, 0.03);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "IBM Plex Mono", monospace;
        background: var(--rust-darker);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(var(--grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      .bg-glow {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          var(--glow-1),
          transparent 70%
        );
        top: -200px;
        right: -200px;
        animation: float 12s ease-in-out infinite alternate;
      }

      .bg-glow-2 {
        position: fixed;
        z-index: 0;
        pointer-events: none;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          var(--glow-2),
          transparent 70%
        );
        bottom: -200px;
        left: -100px;
        animation: float 15s ease-in-out infinite alternate-reverse;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(40px, 30px) scale(1.1);
        }
      }

      #app {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 30px 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #app.quiz-active {
        justify-content: center;
      }

      /* ── HEADER ── */
      .header {
        text-align: center;
        padding: 40px 0 30px;
      }

      .header .logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        font-weight: 600;
        color: var(--rust-orange);
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .header h1 {
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-accent),
          var(--rust-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }

      .header .subtitle {
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 8px;
        letter-spacing: 1px;
      }

      .ferris {
        font-size: 48px;
        margin: 15px 0;
        animation: wiggle 2s ease-in-out infinite;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
      }

      /* ── STATS BAR ── */
      .stats-bar {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      .stat {
        background: var(--bg-card);
        border: 1px solid var(--border-stat);
        border-radius: 10px;
        padding: 10px 18px;
        text-align: center;
        min-width: 100px;
        backdrop-filter: blur(10px);
      }

      .stat-value {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        color: var(--rust-orange);
      }

      .stat-label {
        font-size: 10px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-top: 2px;
      }

      /* ── LEVEL SELECT ── */
      .screen {
        display: none;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .levels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .level-card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        padding: 16px 18px;
        cursor: pointer;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .level-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          var(--card-gradient),
          transparent
        );
        opacity: 0;
        transition: opacity 0.25s;
      }

      .level-card:hover {
        border-color: var(--rust-orange);
        transform: translateY(-2px);
        box-shadow: var(--glow-orange);
      }

      .level-card:hover::before {
        opacity: 1;
      }

      .level-card.locked {
        opacity: 0.4;
        cursor: not-allowed;
        filter: grayscale(0.5);
      }

      .level-card.locked:hover {
        transform: none;
        border-color: var(--border-subtle);
        box-shadow: none;
      }

      .level-card.completed {
        border-color: var(--completed-border);
      }

      .level-card.completed .level-badge {
        background: var(--correct);
        color: var(--rust-darker);
      }

      .level-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--rust-orange);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 5px;
        position: relative;
        z-index: 1;
      }

      .level-title {
        font-size: 14px;
        font-weight: 600;
        position: relative;
        z-index: 1;
        line-height: 1.4;
      }

      .level-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: var(--badge-bg);
        color: var(--rust-orange);
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 6px;
        font-family: "JetBrains Mono", monospace;
      }

      .level-card.locked .level-badge {
        background: var(--badge-locked-bg);
        color: var(--text-dim);
      }

      /* ── QUIZ SCREEN ── */
      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .quiz-chapter {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--rust-orange);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .quiz-progress-text {
        font-size: 13px;
        color: var(--text-dim);
      }

      .progress-bar-container {
        width: 100%;
        height: 6px;
        background: var(--progress-bg);
        border-radius: 3px;
        margin-bottom: 28px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--rust-orange),
          var(--rust-accent)
        );
        border-radius: 3px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .question-card {
        background: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: 16px;
        padding: 30px;
        backdrop-filter: blur(10px);
        margin-bottom: 20px;
      }

      .question-number {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .question-text {
        font-size: 17px;
        font-weight: 500;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .question-text code {
        font-family: "JetBrains Mono", monospace;
        background: var(--code-bg);
        color: var(--rust-accent);
        padding: 2px 7px;
        border-radius: 4px;
        font-size: 14px;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        background: var(--opt-bg);
        border: 1px solid var(--border-card);
        border-radius: 10px;
        padding: 14px 18px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: "IBM Plex Mono", monospace;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
        line-height: 1.5;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .option-btn:hover:not(.disabled) {
        border-color: var(--rust-orange);
        background: var(--opt-hover-bg);
        transform: translateX(4px);
      }

      .option-btn .opt-key {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-weight: 700;
        font-size: 12px;
        background: var(--opt-key-bg);
        color: var(--rust-orange);
        transition: all 0.2s;
      }

      .option-btn.correct {
        border-color: var(--correct);
        background: var(--correct-bg);
        animation: correctPulse 0.5s ease;
      }

      .option-btn.correct .opt-key {
        background: var(--correct);
        color: var(--rust-darker);
      }

      .option-btn.wrong {
        border-color: var(--wrong);
        background: var(--wrong-bg);
        animation: shake 0.4s ease;
      }

      .option-btn.wrong .opt-key {
        background: var(--wrong);
        color: #fff;
      }

      .option-btn.disabled {
        pointer-events: none;
        opacity: 0.5;
      }
      .option-btn.correct.disabled,
      .option-btn.wrong.disabled {
        opacity: 1;
      }

      @keyframes correctPulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.015);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-6px);
        }
        75% {
          transform: translateX(6px);
        }
      }

      .explanation-box {
        margin-top: 16px;
        padding: 14px 18px;
        background: var(--explain-bg);
        border-left: 3px solid var(--terminal-green);
        border-radius: 0 8px 8px 0;
        font-size: 13px;
        line-height: 1.6;
        color: var(--text-dim);
        animation: fadeIn 0.3s ease;
      }

      .explanation-box code {
        font-family: "JetBrains Mono", monospace;
        background: var(--code-bg);
        color: var(--rust-accent);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 12px;
      }

      .next-btn,
      .back-btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        padding: 12px 28px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s ease;
        text-transform: uppercase;
        border: none;
      }

      .next-btn {
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-accent)
        );
        color: #fff;
      }

      .next-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--glow-orange);
      }

      .back-btn {
        background: transparent;
        border: 1px solid var(--back-btn-border) !important;
        color: var(--text-dim);
      }

      .back-btn:hover {
        color: var(--rust-orange);
        border-color: var(--rust-orange) !important;
      }

      .btn-row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      /* ── RESULTS SCREEN ── */
      .results-card {
        background: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: 16px;
        padding: 40px;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      .results-score {
        font-family: "JetBrains Mono", monospace;
        font-size: 64px;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--rust-orange),
          var(--rust-gold)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .results-label {
        font-size: 14px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 8px 0 20px;
      }

      .results-msg {
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .star {
        display: inline-block;
        font-size: 28px;
        margin: 0 3px;
      }
      .star.filled {
        animation: starPop 0.4s ease backwards;
      }
      .star.filled:nth-child(2) {
        animation-delay: 0.15s;
      }
      .star.filled:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes starPop {
        0% {
          transform: scale(0) rotate(-30deg);
          opacity: 0;
        }
        60% {
          transform: scale(1.3) rotate(5deg);
        }
        100% {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-hover);
      }

      /* ── THEME TOGGLE ── */
      .theme-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 100;
        background: var(--bg-card);
        border: 1px solid var(--border-card);
        border-radius: 50%;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        font-size: 18px;
        line-height: 1;
        padding: 0;
      }

      .theme-toggle:hover {
        border-color: var(--rust-orange);
        box-shadow: var(--glow-orange);
        transform: scale(1.1);
      }

      [data-theme="light"] .next-btn:hover {
        box-shadow: 0 6px 25px rgba(212, 64, 0, 0.2);
      }

      [data-theme="light"] .option-btn.correct .opt-key {
        color: #fff;
      }

      [data-theme="light"] .level-card.completed .level-badge {
        color: #fff;
      }

      @media (max-width: 500px) {
        .question-card {
          padding: 20px;
        }
        .levels-grid {
          grid-template-columns: 1fr;
        }
        .stats-bar {
          gap: 8px;
        }
        .stat {
          min-width: 80px;
          padding: 8px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark theme">
      <span id="themeIcon">☀️</span>
    </button>

    <div id="app">
      <div id="homeHeader">
        <div class="header">
          <div class="logo">// The Ferris Challenge</div>
          <h1>Rust Book Quiz</h1>
          <div class="subtitle">
            Master "The Rust Programming Language" — chapter by chapter
          </div>
          <div class="ferris">🦀</div>
        </div>

        <div class="stats-bar">
          <div class="stat">
            <div class="stat-value" id="totalScore">0</div>
            <div class="stat-label">Score</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalCompleted">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalStars">0</div>
            <div class="stat-label">★ Stars</div>
          </div>
        </div>

        <div style="text-align: center; margin-bottom: 20px">
          <button class="back-btn" onclick="resetProgress()">Reset Progress</button>
        </div>

        <div style="text-align: center; margin-bottom: 20px">
          <button class="next-btn" onclick="startRandomQuiz()" style="font-size: 15px; padding: 14px 36px">
            Random Quiz ∞
          </button>
        </div>
      </div>

      <!-- Level Select -->
      <div class="screen active" id="levelSelect">
        <div class="levels-grid" id="levelsGrid"></div>
      </div>

      <!-- Random Quiz Screen -->
      <div class="screen" id="randomScreen">
        <div class="quiz-header">
          <div class="quiz-chapter">Random Mode ∞</div>
          <div class="quiz-progress-text" id="randomScore">0 correct / 0 answered</div>
        </div>
        <div id="randomQuestionArea"></div>
        <div class="btn-row">
          <button class="back-btn" onclick="quitRandomQuiz()">
            ← Quit
          </button>
          <button
            class="next-btn"
            id="randomNextBtn"
            style="display: none"
            onclick="nextRandomQuestion()"
          >
            Next →
          </button>
        </div>
      </div>

      <!-- Quiz Screen -->
      <div class="screen" id="quizScreen">
        <div class="quiz-header">
          <div class="quiz-chapter" id="quizChapter"></div>
          <div class="quiz-progress-text" id="quizProgressText"></div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div id="questionArea"></div>
        <div class="btn-row">
          <button class="back-btn" onclick="showScreen('levelSelect')">
            ← Levels
          </button>
          <button
            class="next-btn"
            id="nextBtn"
            style="display: none"
            onclick="nextQuestion()"
          >
            Next →
          </button>
        </div>
      </div>

      <!-- Results Screen -->
      <div class="screen" id="resultsScreen">
        <div class="results-card">
          <div id="resultsStars"></div>
          <div class="results-score" id="resultsScore"></div>
          <div class="results-label">Correct Answers</div>
          <div class="results-msg" id="resultsMsg"></div>
          <div class="btn-row" style="justify-content: center">
            <button class="back-btn" onclick="showScreen('levelSelect')">
              ← Levels
            </button>
            <button class="next-btn" onclick="retryLevel()">Retry 🔄</button>
          </div>

      // ─── SHUFFLE UTILITY ───
      function shuffleOptions(questions) {
        return questions.map((q) => {
          const correctOpt = q.opts[q.ans];
          // Create index array and shuffle it (Fisher-Yates)
          const indices = q.opts.map((_, i) => i);
          for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
          }
          const newOpts = indices.map((i) => q.opts[i]);
          const newAns = newOpts.indexOf(correctOpt);
          return { ...q, opts: newOpts, ans: newAns };
        });
      }

      // ─── GAME STATE ───
      let state = {
        currentLevel: 0,
        currentQuestion: 0,
        score: 0,
        answered: false,
        levelScores: new Array(levels.length).fill(-1), // -1 = not attempted
        totalScore: 0,
        totalStars: 0,
        shuffledQuestions: [], // holds shuffled version for current level
      };

      // ─── PERSISTENCE ───
      function saveProgress() {
        localStorage.setItem(
          "rustQuiz",
          JSON.stringify({
            levelScores: state.levelScores,
            totalScore: state.totalScore,
            totalStars: state.totalStars,
          }),
        );
      }

      function loadProgress() {
        const saved = localStorage.getItem("rustQuiz");
        if (saved) {
          const data = JSON.parse(saved);
          state.levelScores = data.levelScores;
          state.totalScore = data.totalScore;
          state.totalStars = data.totalStars;
        }
      }

      function resetProgress() {
        if (!confirm("Reset all progress? This cannot be undone.")) return;
        localStorage.removeItem("rustQuiz");
        state.levelScores = new Array(levels.length).fill(-1);
        state.totalScore = 0;
        state.totalStars = 0;
        updateStats();
        renderLevels();
        showScreen("levelSelect");
      }

      // ─── INIT ───
      function init() {
        loadProgress();
        renderLevels();
        updateStats();
      }

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        const isHome = id === "levelSelect";
        document.getElementById("homeHeader").style.display = isHome ? "" : "none";
        document.getElementById("app").classList.toggle("quiz-active", !isHome);
      }

      // ─── LEVEL SELECT ───
      function renderLevels() {
        const grid = document.getElementById("levelsGrid");
        grid.innerHTML = "";
        levels.forEach((lvl, i) => {
          const unlocked = i === 0 || state.levelScores[i - 1] >= 0;
          const completed = state.levelScores[i] >= 0;
          const stars = completed
            ? getStars(state.levelScores[i], lvl.questions.length)
            : 0;
          const card = document.createElement("div");
          card.className = `level-card${unlocked ? "" : " locked"}${completed ? " completed" : ""}`;
          card.innerHTML = `
      <div class="level-num">Chapter ${lvl.chapter}</div>
      <div class="level-title">${lvl.title}</div>
      <div class="level-badge">${completed ? "★".repeat(stars) + "☆".repeat(3 - stars) : unlocked ? "5 Q" : "🔒"}</div>
    `;
          if (unlocked) card.onclick = () => startLevel(i);
          grid.appendChild(card);
        });
      }

      function getStars(correct, total) {
        const pct = correct / total;
        if (pct >= 0.9) return 3;
        if (pct >= 0.6) return 2;
        if (pct > 0) return 1;
        return 0;
      }

      // ─── START LEVEL ───
      function startLevel(idx) {
        state.currentLevel = idx;
        state.currentQuestion = 0;
        state.score = 0;
        state.answered = false;
        state.shuffledQuestions = shuffleOptions(levels[idx].questions);
        showScreen("quizScreen");
        renderQuestion();
      }

      function retryLevel() {
        startLevel(state.currentLevel);
      }

      // ─── RENDER QUESTION ───
      function renderQuestion() {
        const lvl = levels[state.currentLevel];
        const q = state.shuffledQuestions[state.currentQuestion];
        const total = lvl.questions.length;
        const num = state.currentQuestion + 1;

        document.getElementById("quizChapter").textContent =
          `Ch.${lvl.chapter} — ${lvl.title}`;
        document.getElementById("quizProgressText").textContent =
          `${num} / ${total}`;
        document.getElementById("progressBar").style.width =
          `${(num / total) * 100}%`;
        document.getElementById("nextBtn").style.display = "none";
        state.answered = false;

        const keys = ["A", "B", "C", "D"];
        document.getElementById("questionArea").innerHTML = `
    <div class="question-card">
      <div class="question-number">Question ${num} of ${total}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts
          .map(
            (opt, i) => `
          <button class="option-btn" onclick="selectAnswer(${i})" data-idx="${i}">
            <span class="opt-key">${keys[i]}</span>
            <span>${opt}</span>
          </button>
        `,
          )
          .join("")}
      </div>
      <div id="explanationSlot"></div>
    </div>
  `;
      }

      // ─── SELECT ANSWER ───
      function selectAnswer(idx) {
        if (state.answered) return;
        state.answered = true;

        const lvl = levels[state.currentLevel];
        const q = state.shuffledQuestions[state.currentQuestion];
        const btns = document.querySelectorAll(".option-btn");

        btns.forEach((btn, i) => {
          btn.classList.add("disabled");
          if (i === q.ans) btn.classList.add("correct");
          if (i === idx && idx !== q.ans) btn.classList.add("wrong");
        });

        if (idx === q.ans) state.score++;

        document.getElementById("explanationSlot").innerHTML = `
    <div class="explanation-box">
      ${idx === q.ans ? "✅" : "❌"} ${q.explain}
    </div>
  `;

        const isLast = state.currentQuestion >= lvl.questions.length - 1;
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.textContent = isLast ? "See Results →" : "Next →";
        nextBtn.style.display = "inline-block";
      }

      // ─── NEXT QUESTION ───
      function nextQuestion() {
        const lvl = levels[state.currentLevel];
        if (state.currentQuestion < lvl.questions.length - 1) {
          state.currentQuestion++;
          renderQuestion();
        } else {
          finishLevel();
        }
      }

      // ─── FINISH LEVEL ───
      function finishLevel() {
        const lvl = levels[state.currentLevel];
        const total = lvl.questions.length;
        const prev = state.levelScores[state.currentLevel];
        if (state.score > prev) {
          state.levelScores[state.currentLevel] = state.score;
        }

        // Recalculate totals
        state.totalScore = state.levelScores.reduce(
          (s, v) => s + (v > 0 ? v : 0),
          0,
        );
        state.totalStars = state.levelScores.reduce(
          (s, v, i) =>
            s + (v >= 0 ? getStars(v, levels[i].questions.length) : 0),
          0,
        );

        const stars = getStars(state.score, total);
        const messages = [
          "Keep studying! Re-read the chapter and try again. 🦀",
          "Good start! You're getting the fundamentals down.",
          "Solid knowledge! A few more details to master.",
          "Outstanding! You truly own this chapter! 🏆",
        ];

        document.getElementById("resultsStars").innerHTML = [1, 2, 3]
          .map(
            (i) =>
              `<span class="star ${i <= stars ? "filled" : ""}">${i <= stars ? "★" : "☆"}</span>`,
          )
          .join("");
        document.getElementById("resultsScore").textContent =
          `${state.score}/${total}`;
        document.getElementById("resultsMsg").textContent = messages[stars];

        updateStats();
        renderLevels();
        saveProgress();
        showScreen("resultsScreen");
      }

      function updateStats() {
        document.getElementById("totalScore").textContent = state.totalScore;
        document.getElementById("totalCompleted").textContent =
          state.levelScores.filter((v) => v >= 0).length + "/" + levels.length;
        document.getElementById("totalStars").textContent = state.totalStars;
      }

      // ── Keyboard support ──
      document.addEventListener("keydown", (e) => {
        const quizActive = document
          .getElementById("quizScreen")
          .classList.contains("active");
        if (!quizActive) return;
        const keyMap = { a: 0, b: 1, c: 2, d: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
        if (e.key.toLowerCase() in keyMap && !state.answered) {
          selectAnswer(keyMap[e.key.toLowerCase()]);
        }
        if ((e.key === "Enter" || e.key === " ") && state.answered) {
          e.preventDefault();
          nextQuestion();
        }
      });

      // ─── RANDOM QUIZ ───
      let randomState = { correct: 0, total: 0, currentQ: null, answered: false, usedIndices: new Set() };

      function getAllQuestions() {
        const all = [];
        levels.forEach(lvl => lvl.questions.forEach(q => all.push(q)));
        extraQuestions.forEach(q => all.push(q));
        return all;
      }

      function pickRandomQuestion() {
        const all = getAllQuestions();
        if (randomState.usedIndices.size >= all.length) {
          randomState.usedIndices.clear();
        }
        let idx;
        do { idx = Math.floor(Math.random() * all.length); }
        while (randomState.usedIndices.has(idx));
        randomState.usedIndices.add(idx);
        return shuffleOptions([all[idx]])[0];
      }

      function startRandomQuiz() {
        randomState = { correct: 0, total: 0, currentQ: null, answered: false, usedIndices: new Set() };
        showScreen("randomScreen");
        nextRandomQuestion();
      }

      function nextRandomQuestion() {
        randomState.currentQ = pickRandomQuestion();
        randomState.answered = false;
        document.getElementById("randomNextBtn").style.display = "none";
        document.getElementById("randomScore").textContent =
          `${randomState.correct} correct / ${randomState.total} answered`;
        const q = randomState.currentQ;
        const keys = ["A", "B", "C", "D"];
        document.getElementById("randomQuestionArea").innerHTML = `
    <div class="question-card">
      <div class="question-number">Question #${randomState.total + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt, i) => `
          <button class="option-btn" onclick="selectRandomAnswer(${i})" data-idx="${i}">
            <span class="opt-key">${keys[i]}</span>
            <span>${opt}</span>
          </button>
        `).join("")}
      </div>
      <div id="randomExplanationSlot"></div>
    </div>
  `;
      }

      function selectRandomAnswer(idx) {
        if (randomState.answered) return;
        randomState.answered = true;
        randomState.total++;
        const q = randomState.currentQ;
        const btns = document.querySelectorAll("#randomQuestionArea .option-btn");
        btns.forEach((btn, i) => {
          btn.classList.add("disabled");
          if (i === q.ans) btn.classList.add("correct");
          if (i === idx && idx !== q.ans) btn.classList.add("wrong");
        });
        if (idx === q.ans) randomState.correct++;
        document.getElementById("randomScore").textContent =
          `${randomState.correct} correct / ${randomState.total} answered`;
        document.getElementById("randomExplanationSlot").innerHTML = `
    <div class="explanation-box">
      ${idx === q.ans ? "✅" : "❌"} ${q.explain}
    </div>
  `;
        document.getElementById("randomNextBtn").style.display = "inline-block";
      }

      function quitRandomQuiz() {
        showScreen("levelSelect");
      }

      // ── Keyboard support for random mode ──
      document.addEventListener("keydown", (e) => {
        const randomActive = document.getElementById("randomScreen").classList.contains("active");
        if (!randomActive) return;
        const keyMap = { a: 0, b: 1, c: 2, d: 3, 1: 0, 2: 1, 3: 2, 4: 3 };
        if (e.key.toLowerCase() in keyMap && !randomState.answered) {
          selectRandomAnswer(keyMap[e.key.toLowerCase()]);
        }
        if ((e.key === "Enter" || e.key === " ") && randomState.answered) {
          e.preventDefault();
          nextRandomQuestion();
        }
      });

      // ─── THEME ───
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("themeIcon").textContent =
          theme === "light" ? "🌙" : "☀️";
        localStorage.setItem("rust-quiz-theme", theme);
      }

      function toggleTheme() {
        const current =
          document.documentElement.getAttribute("data-theme") || "dark";
        applyTheme(current === "dark" ? "light" : "dark");
      }

      // Load saved theme (default dark)
      (function () {
        const saved = localStorage.getItem("rust-quiz-theme") || "dark";
        applyTheme(saved);
      })();

      init();
